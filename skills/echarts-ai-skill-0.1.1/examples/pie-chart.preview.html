<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECharts Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
      html, body { margin: 0; padding: 0; background: #f3f5f7; font-family: "Segoe UI", sans-serif; }
      .wrap { padding: 24px; }
      #chart { width: 960px; height: 540px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(15, 23, 42, 0.10); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="chart"></div>
    </div>
    <script>
      const chart = echarts.init(document.getElementById("chart"));
      const option = {
  "title": {
    "text": "访问来源占比",
    "subtext": "默认示例数据",
    "left": "center"
  },
  "tooltip": {
    "trigger": "item"
  },
  "legend": {
    "bottom": 0
  },
  "series": [
    {
      "name": "访问来源占比",
      "type": "pie",
      "radius": "60%",
      "data": [
        {
          "name": "直接访问",
          "value": 335
        },
        {
          "name": "邮件营销",
          "value": 310
        },
        {
          "name": "联盟广告",
          "value": 234
        },
        {
          "name": "视频广告",
          "value": 135
        },
        {
          "name": "搜索引擎",
          "value": 1548
        }
      ]
    }
  ]
};
      chart.setOption(option);
    </script>
  </body>
</html>
