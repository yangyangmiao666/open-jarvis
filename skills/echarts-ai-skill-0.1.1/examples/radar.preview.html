<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECharts Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
      html, body { margin: 0; padding: 0; background: #f3f5f7; font-family: "Segoe UI", sans-serif; }
      .wrap { padding: 24px; }
      #chart { width: 960px; height: 540px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(15, 23, 42, 0.10); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="chart"></div>
    </div>
    <script>
      const chart = echarts.init(document.getElementById("chart"));
      const option = {
  "title": {
    "text": "Skill capability radar",
    "left": "center"
  },
  "tooltip": {
    "trigger": "item"
  },
  "legend": {
    "top": 28
  },
  "radar": {
    "indicator": [
      {
        "name": "reasoning",
        "max": 100
      },
      {
        "name": "delivery",
        "max": 100
      },
      {
        "name": "speed",
        "max": 100
      },
      {
        "name": "reliability",
        "max": 100
      }
    ]
  },
  "series": [
    {
      "type": "radar",
      "data": [
        {
          "name": "Codex",
          "value": [
            88,
            92,
            85,
            90
          ]
        },
        {
          "name": "OpenClaw",
          "value": [
            76,
            80,
            91,
            78
          ]
        }
      ]
    }
  ]
};
      chart.setOption(option);
    </script>
  </body>
</html>
